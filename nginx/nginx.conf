server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Reverse proxy: forward /api/* to the backend container ──────────────
    location /api/ {
        proxy_pass         http://backend:4000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Allow file uploads (matches backend limit)
        client_max_body_size 50M;
    }

    # ── Reverse proxy: forward /uploads/* to backend static files ────────────
    location /uploads/ {
        proxy_pass         http://backend:4000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
    }

    # ── Cache static assets aggressively ─────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Handle React Router — all unknown paths fall back to index.html ──────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
